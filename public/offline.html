<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sate</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #edeae3;
        color: #2e2e2c;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .wrap {
        box-sizing: border-box;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 12px;
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
      }
      p {
        margin: 0;
        font-size: 16px;
        color: #53544f;
      }
      a {
        margin-top: 4px;
        font-size: 16px;
        color: #2e2e2c;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>You're offline</h1>
      <p>Reopen when you're back online</p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
